<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Forms CV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header" id="title">Formulario de currículo.</header>
  <form action="" method="get" id="form-cv">
  <fieldset class="fieldset">
    <label for="name-input" id="name-label">Nome:</label>
    <input type="text" id="name-input" placeholder="Nome completo" maxlength="40" required name="name";>
    <br>
    <br>
    <label for="email-input" id="mail-label">E-mail:</label>
    <input type="email" name="e-mail" id="email-input" required placeholder="digite seu e-mail" maxlength="50" required> 
    <label for="" id="cpf-label">cpf:</label>
    <input type="text" id="cpf-input" placeholder="Digite CPF" maxlength="11" required name="cpf">
    <br>
    <br>
    <label for="" id="end-label">Endereço</label>
    <input type="text" id="end-input" placeholder="Preencha com seu Endereço" maxlength="200" name="end">
    <label for="cidade" id="city">Cidade</label>
    <input type="text" id="cidade" maxlength="28" required placeholder="Cidade" name="city">
    <label for="estado" id="state">Estado</label>
    <select name="estado" id="estado" placeholder="Selecione uma opção" required></select>
    <br>
    <p id="living-label">Moradia</p>
    <label for="living-type">
    <input type="radio" id="living-type" name="moradia" value="house" required> Casa
  </label>
    <label for="living-type2">
    <input type="radio" id="living-type2" name="moradia" value="ap" required> Apartamento
  </label>
</fieldset>
<fieldset class="fieldset">
  <label for="abstract" id="abstract-cv">Resumo do Curriculo </label>
  <br>
  <br>
  <textarea name="Resumo" id="abstract" cols="30" rows="10" maxlength="1000" placeholder="Insira algumas informações sobre sua formação e sobre você." required></textarea>
  <br>
  <br>
  <label for="cargo" id="last-job">Último Cargo:</label>
  <br>
  <br>
  <input type="text" id="cargo" placeholder="Última função exercida." maxlength="40" required name="cargo">
  <br>
  <br>
  <label for="description" id="job">Descrição do cargo</label>
  <br>
  <br>
  <textarea name="job-description" id="description" cols="30" rows="10" maxlength="500" required placeholder="Fale sobre suas atividades no último cargo que ocupou."></textarea>
  <br>
  <br>
  <label for="date" id="data-inicio" class="data">Data de Início</label>
  <br>
  <br>
  <input type="date" name="data" id="date" required>
  <br>
  <br>
  <label for="end-date" id="data-fim" class="data">Data de Saída</label>
  <br>
  <br>
  <input type="date" name="data-saida" id="end-date">
</fieldset>
<button type="submit" id="save-btn">Salvar</button>
</form>
  <script src="script.js"></script>
</body>
</html>
